services:
  - type: web
    name: tms-leadgen
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: GOOGLE_WEB_CREDENTIALS_JSON
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SEARCH_API_KEY
        sync: false
      - key: ZOOMINFO_CLIENT_ID
        sync: false
      - key: ZOOMINFO_CLIENT_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: worker
    name: tms-leadgen-scheduler
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: FLASK_SECRET_KEY
        fromService:
          name: tms-leadgen
          type: web
          envVarKey: FLASK_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: tms-leadgen-db
          property: connectionString
      - key: GOOGLE_WEB_CREDENTIALS_JSON
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: tms-leadgen-db
    plan: free
    region: oregon
